<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>批次成分查詢 (GC/MS)</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;background:transparent;}
  body{ color:#1c2530; font-family:-apple-system,'PingFang TC','Noto Sans TC','Helvetica Neue',Helvetica,Arial,sans-serif; line-height:1.6; padding:8px; }
  /* 固定窄欄、置中：電腦與手機結構完全相同，高度才會一致 */
  .wrap{ max-width:520px; margin:0 auto; }
  .title{ border-bottom:1px solid #dde3ea; color:#2f4a6b; font-size:18px; font-weight:600; letter-spacing:.06em; margin:0 0 14px; padding-bottom:9px; }
  .card{ background:#fff; border:1px solid #dde3ea; border-radius:12px; box-shadow:0 6px 18px rgba(28,37,48,.05); padding:20px; }
  .lab{ color:#1c2530; font-size:13px; font-weight:600; display:block; margin-bottom:8px; }
  .row{ display:flex; gap:8px; flex-wrap:nowrap; }
  .row input{ flex:1 1 auto; min-width:0; padding:11px; border:1px solid #c9d2dd; border-radius:7px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px; text-transform:uppercase; letter-spacing:.04em; }
  .row button{ flex:0 0 auto; background:#2f4a6b; color:#fff; border:none; border-radius:7px; padding:0 18px; font-size:14px; font-weight:600; cursor:pointer; }
  .row button:hover{ filter:brightness(1.08); }
  .meta{ display:flex; gap:10px; justify-content:space-between; background:#f6f8fa; border-radius:8px; padding:12px 14px; margin-top:14px; font-size:13px; }
  .meta .k{ color:#8a8f98; }
  .meta b{ color:#1c2530; }
  .meta .mono{ font-family:ui-monospace,Menlo,Consolas,monospace; }
  /* 下載連結：永遠單欄橫條，電腦手機一致 */
  .links{ margin-top:12px; }
  .links a{ display:flex; align-items:center; justify-content:space-between; gap:10px; text-decoration:none; background:#fff; border:1px solid #dde3ea; border-radius:9px; padding:13px 16px; margin-bottom:8px; }
  .links a:last-child{ margin-bottom:0; }
  .links a .n{ color:#1c2530; font-size:14px; font-weight:600; }
  .links a .g{ color:#2f4a6b; font-size:13px; font-weight:600; white-space:nowrap; }
  .foot{ color:#8a8f98; font-size:11px; margin:12px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">批次成分查詢 (GC/MS)</div>
  <div class="card">
    <label class="lab" for="b">輸入產品批號 (Batch No.)</label>
    <div class="row">
      <input id="b" type="text" value="050326F" placeholder="例如 050326F">
      <button id="go">分析</button>
    </div>

    <div class="meta">
      <span><span class="k">批次號</span> <b class="mono" id="vBatch">—</b></span>
      <span><span class="k">報告日期</span> <b id="vDate">—</b></span>
    </div>

    <div class="links">
      <a id="lGc" href="#" target="_blank" rel="noopener"><span class="n">GC/MS 檢測圖譜</span><span class="g">下載文件 &rarr;</span></a>
      <a id="lMs" href="#" target="_blank" rel="noopener"><span class="n">MSDS 安全資料</span><span class="g">調閱文件 &rarr;</span></a>
      <a id="lTd" href="#" target="_blank" rel="noopener"><span class="n">TDS 技術規格</span><span class="g">調閱文件 &rarr;</span></a>
    </div>
    <p class="foot" id="foot"></p>
  </div>
</div>

<script>
  // ===== 設定 =====
  const CODE = "FLEX006";
  const BASE = "https://www.florihana.com/en/module/axproductattachments/export";
  // 已知批號的附加資料（沒列到的批號仍可查，只是日期顯示 —）
  const META = {
    "050326F": { date:"05/03/2026" }
    // 之後新批號往這加：  "新批號": { date:"DD/MM/YYYY" },
  };

  const $ = id => document.getElementById(id);
  function urls(batch){
    const c = encodeURIComponent(CODE);
    return {
      gc: `${BASE}?type=Chromatographies&file=${encodeURIComponent(CODE+batch+'.pdf')}&reference=${c}`,
      ms: `${BASE}?type=${encodeURIComponent('Fiche de sécurité')}&file=${encodeURIComponent(CODE+'.pdf')}&reference=${c}`,
      td: `${BASE}?type=${encodeURIComponent('Fiche technique')}&file=${encodeURIComponent(CODE+'FT.pdf')}&reference=${c}`
    };
  }
  function analyze(){
    const batch = $('b').value.trim().toUpperCase();
    $('b').value = batch;
    if(!batch){ return; }
    const m = META[batch] || { date:'—' };
    const u = urls(batch);
    $('vBatch').textContent = batch;
    $('vDate').textContent  = m.date;
    $('lGc').href = u.gc; $('lMs').href = u.ms; $('lTd').href = u.td;
    $('foot').textContent = `* 批號 ${batch} 對應 GC/MS 圖譜檔 ${CODE}${batch}.pdf；文件由原廠 Florihana 提供。`;
  }
  $('go').onclick = analyze;
  $('b').addEventListener('keydown', e=>{ if(e.key==='Enter') analyze(); });
  analyze(); // 載入即顯示預設批號 050326F
</script>
</body>
</html>
