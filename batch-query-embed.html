<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>批次成分查詢 (GC/MS)</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;background:transparent;}
  body{ color:#1c2530; font-family:-apple-system,'PingFang TC','Noto Sans TC','Helvetica Neue',Helvetica,Arial,sans-serif; line-height:1.7; padding:8px; }
  .wrap{ max-width:760px; margin:0 auto; }
  .title{ border-bottom:1px solid #dde3ea; color:#2f4a6b; font-size:19px; font-weight:600; letter-spacing:.06em; margin:0 0 18px; padding-bottom:10px; }
  .card{ background:#fff; border:1px solid #dde3ea; border-radius:12px; box-shadow:0 8px 24px rgba(28,37,48,.05); padding:28px; }
  .lab{ color:#1c2530; font-size:14px; font-weight:600; display:block; margin-bottom:10px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; }
  .row input{ flex:1 1 200px; min-width:0; padding:12px; border:1px solid #c9d2dd; border-radius:7px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px; text-transform:uppercase; letter-spacing:.04em; }
  .row button{ flex:0 0 auto; background:#2f4a6b; color:#fff; border:none; border-radius:7px; padding:12px 24px; font-size:14px; font-weight:600; cursor:pointer; }
  .row button:hover{ filter:brightness(1.08); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; text-align:center; margin-top:22px; }
  .cell{ background:#f6f8fa; border-radius:8px; padding:16px; }
  .cell .k{ color:#8a8f98; font-size:11px; letter-spacing:.05em; text-transform:uppercase; }
  .cell .v{ color:#1c2530; font-size:17px; font-weight:700; margin-top:4px; }
  .cell .v.mono{ font-family:ui-monospace,Menlo,Consolas,monospace; }
  .badge{ display:inline-block; background:#eaf3ee; color:#2f7a55; border-radius:999px; padding:4px 12px; font-size:12px; font-weight:600; margin-top:14px; }
  .dl{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:18px; }
  .dl a{ display:block; text-align:center; text-decoration:none; background:#fff; border:1px solid #dde3ea; border-radius:10px; padding:18px 14px; }
  .dl a .n{ color:#1c2530; font-size:14px; font-weight:600; margin-bottom:8px; }
  .dl a .g{ color:#2f4a6b; font-size:13px; font-weight:600; }
  .foot{ color:#8a8f98; font-size:12px; margin:14px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">批次成分查詢 (GC/MS)</div>
  <div class="card">
    <label class="lab" for="b">輸入產品批號 (Batch No.)</label>
    <div class="row">
      <input id="b" type="text" value="050326F" placeholder="例如 050326F">
      <button id="go">分析</button>
    </div>

    <div class="grid">
      <div class="cell"><div class="k">批次號</div><div class="v mono" id="vBatch">—</div></div>
      <div class="cell"><div class="k">報告日期</div><div class="v" id="vDate">—</div></div>
    </div>
    <div class="dl">
      <a id="lGc" href="#" target="_blank" rel="noopener"><div class="n">GC/MS 檢測圖譜</div><div class="g">下載文件 &rarr;</div></a>
      <a id="lMs" href="#" target="_blank" rel="noopener"><div class="n">MSDS 安全資料</div><div class="g">調閱文件 &rarr;</div></a>
      <a id="lTd" href="#" target="_blank" rel="noopener"><div class="n">TDS 技術規格</div><div class="g">調閱文件 &rarr;</div></a>
    </div>
    <p class="foot" id="foot"></p>
  </div>
</div>

<script>
  // ===== 設定 =====
  const CODE = "FLEX006";
  const BASE = "https://www.florihana.com/en/module/axproductattachments/export";
  // 已知批號的附加資料（沒列到的批號仍可查，只是日期/咖啡因顯示 —）
  const META = {
    "050326F": { date:"05/03/2026" }
    // 之後新批號往這加：  "新批號": { date:"DD/MM/YYYY" },
  };

  const $ = id => document.getElementById(id);
  function urls(batch){
    const c = encodeURIComponent(CODE);
    return {
      gc: `${BASE}?type=Chromatographies&file=${encodeURIComponent(CODE+batch+'.pdf')}&reference=${c}`,
      ms: `${BASE}?type=${encodeURIComponent('Fiche de sécurité')}&file=${encodeURIComponent(CODE+'.pdf')}&reference=${c}`,
      td: `${BASE}?type=${encodeURIComponent('Fiche technique')}&file=${encodeURIComponent(CODE+'FT.pdf')}&reference=${c}`
    };
  }
  function analyze(){
    const batch = $('b').value.trim().toUpperCase();
    $('b').value = batch;
    if(!batch){ return; }
    const m = META[batch] || { date:'—' };
    const u = urls(batch);
    $('vBatch').textContent = batch;
    $('vDate').textContent  = m.date;
    $('lGc').href = u.gc; $('lMs').href = u.ms; $('lTd').href = u.td;
    $('foot').textContent = `* 批號 ${batch} 對應 GC/MS 圖譜檔 ${CODE}${batch}.pdf；文件由原廠 Florihana 提供。`;
  }
  $('go').onclick = analyze;
  $('b').addEventListener('keydown', e=>{ if(e.key==='Enter') analyze(); });
  analyze(); // 載入即顯示預設批號 050326F
</script>
</body>
</html>
