<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>批次成分查詢 (GC/MS)</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;background:transparent;}
  body{ color:#1c2530; font-family:-apple-system,'PingFang TC','Noto Sans TC','Helvetica Neue',Helvetica,Arial,sans-serif; line-height:1.6; padding:6px; -webkit-font-smoothing:antialiased; }
  /* 置中窄欄；電腦最寬 700，手機自動滿版 */
  .wrap{ max-width:700px; margin:0 auto; }
  .card{ background:#fff; border:1px solid #dde3ea; border-radius:12px; box-shadow:0 6px 18px rgba(28,37,48,.05); padding:24px 22px; }

  .lead{ font-size:17px; font-weight:600; color:#1c2530; letter-spacing:.05em; margin:0 0 6px; }
  .sub{ font-size:13px; color:#8a8f98; letter-spacing:.02em; margin:0 0 18px; }

  .row{ display:flex; gap:8px; flex-wrap:nowrap; margin-bottom:18px; }
  .row input{ flex:1 1 auto; min-width:0; padding:11px; border:1px solid #c9d2dd; border-radius:7px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px; text-transform:uppercase; letter-spacing:.06em; }
  .row input:focus{ outline:none; border-color:#2f4a6b; }
  .row button{ flex:0 0 auto; background:#2f4a6b; color:#fff; border:none; border-radius:7px; padding:0 20px; font-size:14px; font-weight:600; letter-spacing:.04em; cursor:pointer; }
  .row button:hover{ filter:brightness(1.08); }

  /* 文件卡：橫向三欄（標籤 | 標題 | 說明）＋ 右側箭頭，整列可點 */
  .docs{ display:flex; flex-direction:column; gap:10px; }
  .doc{ display:flex; align-items:flex-start; gap:14px; background:#f6f8fa; border:1px solid #dde3ea; border-radius:10px; padding:16px; text-decoration:none; color:inherit; transition:border-color .15s, transform .15s; }
  .doc:hover{ border-color:#2f4a6b; transform:translateY(-1px); }
  .doc .badge{ flex:0 0 66px; text-align:center; font-size:11px; font-weight:700; letter-spacing:.04em; color:#2f4a6b; background:#eef2f6; padding:6px 0; border-radius:6px; }
  .doc .ttl{ flex:0 0 92px; font-size:14px; font-weight:600; color:#1c2530; letter-spacing:.03em; white-space:nowrap; }
  .doc .desc{ flex:1; min-width:0; font-size:13px; color:#8a8f98; line-height:1.8; }
  .doc .arrow{ flex:0 0 auto; align-self:center; display:inline-flex; color:#2f4a6b; }
  .doc .arrow svg{ width:14px; height:14px; }
  .doc.off{ opacity:.5; pointer-events:none; }

  /* 空狀態（未帶商品代碼時）*/
  .empty{ display:none; font-size:14px; color:#8a8f98; line-height:1.9; text-align:center; padding:20px 6px 6px; }

  @media(max-width:520px){
    body{ padding:0; }
    .wrap{ max-width:100%; }
    .card{ padding:18px 14px; border-radius:10px; }
    .row button{ padding:0 16px; }
    /* 手機：標籤一列，標題＋說明掉到下一行，避免擠壓 */
    .doc{ flex-wrap:wrap; padding:14px 13px; }
    .doc .ttl{ flex:1 1 auto; }
    .doc .desc{ flex:1 1 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <p class="lead">每一瓶皆對應一組化學指紋。</p>
    <p class="sub">批次代碼,是調閱對應文件的識別碼。</p>

    <div class="row">
      <input id="b" type="text" placeholder="輸入產品批號">
      <button id="go">查詢</button>
    </div>

    <div class="docs">
      <a class="doc" id="lGc" target="_blank" rel="noopener">
        <span class="badge">GC/MS</span>
        <span class="ttl">化學指紋圖譜</span>
        <span class="desc">呈現主要成分比例與化學特徵，協助專業使用者判讀每一批次的氣味輪廓。</span>
        <span class="arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5l6 6"/><path d="M11 6v5H6"/></svg></span>
      </a>
      <a class="doc" id="lMs" target="_blank" rel="noopener">
        <span class="badge">MSDS</span>
        <span class="ttl">安全資料</span>
        <span class="desc">提供物理與化學特徵資訊，作為儲存、運輸與專業應用的安全參考。</span>
        <span class="arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5l6 6"/><path d="M11 6v5H6"/></svg></span>
      </a>
      <a class="doc" id="lTd" target="_blank" rel="noopener">
        <span class="badge">TDS</span>
        <span class="ttl">技術規格</span>
        <span class="desc">包含產品識別與物性資料，以此呈現產品的一致性輪廓。</span>
        <span class="arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5l6 6"/><path d="M11 6v5H6"/></svg></span>
      </a>
    </div>

    <p class="empty">請從商品頁的「批次成分文件查詢」進入，<br>即可調閱對應批次的 GC/MS、MSDS、TDS。</p>
  </div>
</div>

<script>
  /* ===== 公版設定點 ===== */
  // 商品代碼自動偵測（依序嘗試）：
  //   1) iframe 網址帶 ?code=FLE047 → 直接用（手動指定時）
  //   2) 從外層商品頁網址 document.referrer 抓 FLEX/FLJ/FLK/FLE…代碼
  //      （外層 iframe 需加 referrerpolicy="unsafe-url"，才會帶完整網址進來）
  //   3) 都讀不到 → 回傳空字串，顯示空狀態提示（不帶任何商品）
  function detectCode(){
    const q = new URLSearchParams(location.search).get('code');
    if (q) return q.toUpperCase();
    const m = (document.referrer || "").match(/FL[A-Z]+\d+/i);
    if (m) return m[0].toUpperCase();
    return "";   // 都讀不到 → 空狀態（顯示提示，不帶任何商品）
  }
  const CODE = detectCode();
  const BASE = "https://www.florihana.com/en/module/axproductattachments/export";

  // 例外檔名表：只有「檔名非標準」的商品才需要在這裡登記。
  // 標準規則 = MSDS:{代號}.pdf、TDS:{代號}FT.pdf，沒登記的商品自動套用，不必管。
  //
  // 怎麼新增例外（某商品 MSDS/TDS 點下去是空白或壞檔時）：
  //  1. 到該商品 Florihana 頁面點 MSDS/TDS，複製網址 file= 後的完整檔名。
  //  2. 照下面格式加一筆：代碼大寫、檔名整串照貼、各筆之間加逗號。
  //  3. Commit，GitHub Pages 約 1 分鐘後生效。
  //  只有一項例外就只寫那項，另一項省略 → 自動走標準規則。
  const OVERRIDES = {
    "FLEX006": {
      msds: "FLEX006 CAFE TORIFIE BIO FDS 2026.pdf",
      tds:  "FLEX006 CAFE TORIFIE BIO FT 2026.pdf"
    }
    // 之後有「其他」例外商品照這個格式往這加（換成該商品的代碼與完整檔名）：
    // "新商品代碼": { msds: "完整MSDS檔名.pdf", tds: "完整TDS檔名.pdf" },
  };
  const _ov = OVERRIDES[CODE] || {};
  const MSDS_FILE = _ov.msds || "";   // 空字串 → 自動套標準規則
  const TDS_FILE  = _ov.tds  || "";
  /* ===================================== */

  const $ = id => document.getElementById(id);
  function urls(batch){
    const c = encodeURIComponent(CODE);
    return {
      gc: `${BASE}?type=Chromatographies&file=${encodeURIComponent(CODE+batch+'.pdf')}&reference=${c}`,
      ms: `${BASE}?type=${encodeURIComponent('Fiche de sécurité')}&file=${encodeURIComponent(MSDS_FILE || CODE+'.pdf')}&reference=${c}`,
      td: `${BASE}?type=${encodeURIComponent('Fiche technique')}&file=${encodeURIComponent(TDS_FILE || CODE+'FT.pdf')}&reference=${c}`
    };
  }
  function analyze(){
    const batch = $('b').value.trim().toUpperCase();
    $('b').value = batch;
    const u = urls(batch);
    // MSDS / TDS 只認商品代碼，永遠是原廠當前版，隨時可點
    $('lMs').href = u.ms;
    $('lTd').href = u.td;
    // GC/MS 依批號組檔名；沒有批號就停用該卡片
    if(batch){
      $('lGc').href = u.gc;
      $('lGc').classList.remove('off');
    } else {
      $('lGc').removeAttribute('href');
      $('lGc').classList.add('off');
    }
  }
  if (CODE) {
    // 有商品代碼：正常啟用查詢
    $('go').onclick = analyze;
    $('b').addEventListener('keydown', e=>{ if(e.key==='Enter') analyze(); });
    analyze(); // 載入：批號留空 → GC/MS 待輸入，MSDS/TDS 直接可用
  } else {
    // 無代碼：隱藏查詢與文件，顯示提示
    document.querySelector('.sub').style.display  = 'none';
    document.querySelector('.row').style.display  = 'none';
    document.querySelector('.docs').style.display = 'none';
    document.querySelector('.empty').style.display = 'block';
  }

  // ===== 回報實際高度給外層頁面，讓 iframe 高度自動貼合（手機/電腦一致）=====
  function postHeight(){
    const h = Math.ceil(document.documentElement.getBoundingClientRect().height);
    parent.postMessage({ ahBatchHeight: h }, '*');
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  // 內容因互動而改變時也重新回報
  if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
</script>
</body>
</html>
