name: 更新批次文件清單

# 資料不常變動，所以只在每年 1/1、7/1 各全掃一次（全部商品）。
# 進貨後想立刻更新某項：Run workflow 在 codes 欄填代碼，只抓那幾項。
on:
  schedule:
    - cron: '0 2 1 1,7 *'    # 每年 1/1、7/1 UTC 02:00 ＝ 法國凌晨 3～4 點
  workflow_dispatch:
    inputs:
      codes:
        description: '只更新這幾項（空白＝全部）。例：FLV003 FLE047'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 抓取批次清單
        env:
          CODES: ${{ github.event.inputs.codes }}
        run: node scripts/fetch-batches.mjs

      - name: 有變動才提交
        run: |
          git add batches.json
          if git diff --cached --quiet; then
            echo "批次清單無變動，略過提交。"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: 更新批次文件清單 $(date -u '+%Y-%m-%d')"
            git push
          fi
