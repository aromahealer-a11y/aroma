name: 更新批次文件清單

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 抓取批次清單
        run: node scripts/fetch-batches.mjs

      - name: 有變動才提交
        run: |
          git add batches.json
          if git diff --cached --quiet; then
            echo "批次清單無變動，略過提交。"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: 更新批次文件清單 $(date -u '+%Y-%m-%d')"
            git push
          fi
